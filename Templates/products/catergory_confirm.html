{% extends "base.html" %}
{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-9 col-md-6 col-lg-5">

            <div class="card border-0 shadow-lg rounded-4 p-4 text-center">

                <div class="mb-3">
                    <h4 class="fw-bold text-danger">⚠ Delete Product</h4>
                </div>

                <p class="text-muted">
                    Are you sure you want to delete this product?
                </p>

                <h5 class="fw-semibold mb-4">
                    "{{ object.name }}"
                </h5>

                <form method="POST">
                    {% csrf_token %}

                    <div class="d-grid gap-2">
                        <button type="submit" 
                                class="btn btn-danger py-2 rounded-3 fw-semibold">
                            Yes, Delete
                        </button>

                        <a href="{% url 'category_list' %}" 
                           class="btn btn-outline-secondary py-2 rounded-3">
                            Cancel
                        </a>
                    </div>
                </form>

            </div>

        </div>
    </div>
</div>

{% endblock %}
