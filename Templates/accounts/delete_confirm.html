{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <div class="card p-4 shadow-sm">
        <h4 class="mb-3 text-danger">Delete Complaint</h4>

        <p>Are you sure you want to delete this complaint?</p>
        <p><strong>Issue:</strong> {{ complaint.issue_type }}</p>

        <form action="{% url 'delete_complaint' complaint.id %}" method="POST" style="display:inline;">
    {% csrf_token %}
    <button type="submit" class="btn btn-sm btn-danger">
        Delete
    </button>
    <a href="{% url 'my_complaints' %}" class="btn btn-secondary">Cancel</a>
</form>

    </div>
</div>

{% endblock %}
